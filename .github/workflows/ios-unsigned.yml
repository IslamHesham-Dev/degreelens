name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-15

    env:
      COCOAPODS_DISABLE_STATS: "true"
      LANG: en_US.UTF-8
      API_BASE_URL: https://degreelens-api.onrender.com

    defaults:
      run:
        shell: bash
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          architecture: arm64
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: |
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Build iOS (No Code Signing)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Package IPA
        run: |
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -name "*.app" -print -quit)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app bundle not found."
            exit 1
          fi

          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/

          cd build/ios/ipa
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: mobile/build/ios/ipa/app.ipa
          if-no-files-found: error
